server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: aimbase

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  # ─── Master DataSource (테넌트 레지스트리, 구독 관리) ─────────────
  datasource:
    master:
      url: ${MASTER_DB_URL:jdbc:postgresql://localhost:5432/aimbase_master}
      username: ${MASTER_DB_USERNAME:platform}
      password: ${MASTER_DB_PASSWORD:platform}
      driver-class-name: org.postgresql.Driver
      hikari:
        pool-name: master-pool
        maximum-pool-size: 10
        minimum-idle: 2
        virtual-threads-executor: true

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  # Flyway 자동 설정 비활성 — FlywayMultiTenantConfig에서 수동 관리
  flyway:
    enabled: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 5000ms

  # LLM 채팅은 Connection DB 기반 — Chat 자동설정 제외 (PlatformApplication)
  # Spring AI 임베딩: OPENAI_API_KEY 환경변수 설정 시 EmbeddingModel 자동 생성
  #                   미설정 시 EmbeddingService가 ConditionalOnBean으로 비활성화
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      embedding:
        options:
          model: text-embedding-3-small
          dimensions: 1536
    # ─── MCP Server SSE 설정 (FlowGuard 교훈 반영) ──────────────────────
    # context-path 사용 시 base-url 필수. 미설정 시 SSE data에 prefix 누락되어 클라이언트 연결 실패.
    mcp:
      server:
        base-url: ${MCP_SERVER_BASE_URL:}
        sse-message-endpoint: /mcp/message
        sse-endpoint: /sse

# Virtual Threads (Java 21)
spring.threads.virtual.enabled: true

# ─── RAG MCP 설정 (Python 사이드카 연동, CR-002) ─────────────────────
rag:
  mcp:
    url: ${RAG_MCP_URL:http://localhost:8000}
    enabled: ${RAG_MCP_ENABLED:false}

# ─── Safety MCP 설정 (PII Detection, Sprint 16) ──────────────────────
safety:
  mcp:
    url: ${SAFETY_MCP_URL:http://localhost:8001}
    enabled: ${SAFETY_MCP_ENABLED:false}

# ─── Evaluation MCP 설정 (RAG/LLM 평가, Sprint 17) ───────────────────
evaluation:
  mcp:
    url: ${EVALUATION_MCP_URL:http://localhost:8002}
    enabled: ${EVALUATION_MCP_ENABLED:false}

# ─── Agent MCP 설정 (고급 추론 체인, Sprint 18) ────────────────────────
agent:
  mcp:
    url: ${AGENT_MCP_URL:http://localhost:8003}
    enabled: ${AGENT_MCP_ENABLED:false}

# ─── Claude Code CLI 도구 설정 ───────────────────────────────────────
# Claude Code를 워크플로우 TOOL_CALL Step으로 사용.
# 인증: 로컬은 `claude login`, 서버/AWS는 api-key 설정.
claude-code:
  enabled: ${CLAUDE_CODE_ENABLED:false}
  executable: ${CLAUDE_CODE_EXECUTABLE:claude}
  api-key: ${CLAUDE_CODE_API_KEY:}
  timeout-seconds: ${CLAUDE_CODE_TIMEOUT:300}
  max-turns: ${CLAUDE_CODE_MAX_TURNS:10}
  default-allowed-tools: ${CLAUDE_CODE_ALLOWED_TOOLS:}
  working-directory: ${CLAUDE_CODE_WORKING_DIR:}
  default-session-persistence: ${CLAUDE_CODE_SESSION_PERSISTENCE:true}
  default-system-prompt: ${CLAUDE_CODE_SYSTEM_PROMPT:PDF 파일은 반드시 Read 도구로 읽어라. 문서 요약 시 모든 페이지와 첨부자료, 표, 수치 데이터를 빠짐없이 포함하라.}

# ─── Platform 설정 (테넌트 프로비저닝 기본값) ────────────────────────
platform:
  default-db-host: ${TENANT_DB_HOST:localhost}
  default-db-port: ${TENANT_DB_PORT:5432}
  default-db-username: ${TENANT_DB_USERNAME:platform}
  default-db-password: ${TENANT_DB_PASSWORD:platform}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ─── JWT 설정 ─────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:aimbase-dev-secret-key-change-in-production-min-256-bits!!}
  expiration-ms: 1800000
  refresh-expiration-ms: 604800000

# ─── 스토리지 설정 ────────────────────────────────────────────────────
storage:
  local:
    base-path: ${STORAGE_BASE_PATH:/data/aimbase}

logging:
  level:
    com.platform: INFO
    com.platform.tenant: DEBUG
    org.springframework.ai: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
